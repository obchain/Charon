[workspace]
resolver = "2"
members = [
    "crates/charon-core",
    "crates/charon-flashloan",
    "crates/charon-protocols",
    "crates/charon-scanner",
    "crates/charon-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Charon Contributors"]
license = "MIT"
description = "Multi-chain flash-loan liquidation bot"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Ethereum / EVM interaction
alloy = { version = "0.8", features = ["full"] }

# Serialization + config
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Async trait objects
async-trait = "0.1"

# Stream adapters (StreamExt for subscription streams)
futures-util = "0.3"

# Lock-free concurrent hashmap for scanner state
dashmap = "6"

# CLI
clap = { version = "4", features = ["derive"] }

# .env loader
dotenvy = "0.15"

# Internal crates
charon-core = { path = "crates/charon-core" }
charon-flashloan = { path = "crates/charon-flashloan" }
charon-protocols = { path = "crates/charon-protocols" }
charon-scanner = { path = "crates/charon-scanner" }
