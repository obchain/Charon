[workspace]
resolver = "2"
members = [
    "crates/charon-core",
    "crates/charon-executor",
    "crates/charon-flashloan",
    "crates/charon-metrics",
    "crates/charon-protocols",
    "crates/charon-scanner",
    "crates/charon-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Charon Contributors"]
license = "MIT"
description = "Multi-chain flash-loan liquidation bot"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Ethereum / EVM interaction
alloy = { version = "0.8", features = ["full"] }

# Serialization + config
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"

# Async trait objects
async-trait = "0.1"

# Stream adapters (StreamExt for subscription streams)
futures-util = "0.3"

# Lock-free concurrent hashmap for scanner state
dashmap = "6"

# CLI
clap = { version = "4", features = ["derive"] }

# .env loader
dotenvy = "0.15"

# Metrics facade + Prometheus exporter
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", default-features = false, features = ["http-listener"] }

# Structured error types (library crates)
thiserror = "1"

# Internal crates
charon-core = { path = "crates/charon-core" }
charon-executor = { path = "crates/charon-executor" }
charon-flashloan = { path = "crates/charon-flashloan" }
charon-metrics = { path = "crates/charon-metrics" }
charon-protocols = { path = "crates/charon-protocols" }
charon-scanner = { path = "crates/charon-scanner" }

# Workspace-wide lint policy. Every crate that opts in via
# `[lints] workspace = true` inherits these; new crates should opt
# in from day one. Mirrors the floor established on
# feat/20-multi-liq-batcher (see issue #211) so the two lineages
# converge on identical lint posture at merge time.
[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
arithmetic_side_effects = "deny"
cast_possible_truncation = "deny"
unwrap_used = "deny"
