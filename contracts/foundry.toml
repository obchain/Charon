[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
# BSC does not support PUSH0 (0x5f). solc 0.8.24 defaults to Shanghai
# and emits PUSH0, so the target EVM must be pinned to Paris or every
# deploy faults on-chain at the first PUSH0 site. The in-process
# revm used by `forge test` accepts PUSH0, which is why a fork-test
# pass is NOT equivalent to a BSC-deploy pass without this pin.
evm_version = "paris"
optimizer = true
optimizer_runs = 1_000_000
via_ir = false
remappings = [
    "forge-std/=lib/forge-std/src/",
]

# Forge fmt — 100-char width, 4-space indent — matches the Rust side.
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Fork-test endpoint for BSC mainnet — `BNB_HTTP_URL` from the repo
# `.env`. Aliased here so test scripts can pass `--fork-url bnb`.
[rpc_endpoints]
bnb = "${BNB_HTTP_URL}"

[etherscan]
bnb = { key = "${BSCSCAN_API_KEY}", chain = 56 }
