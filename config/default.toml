# Charon — v1 config (Venus on BNB Chain)
#
# Environment variables below (dollar-sign + braces) are substituted at
# load time — see `.env.example` for the full list of expected vars.

[bot]
# Drop opportunities below this USD profit threshold, in USD × 1e6.
# 5_000_000 = $5.00. Integer fixed-point to avoid f64 precision.
min_profit_usd_1e6 = 5000000
# Skip liquidations when gas price exceeds this, in wei (decimal string).
# "3000000000" = 3 gwei. Sub-gwei priority fees are representable.
max_gas_wei = "3000000000"
# Polling cadence for protocols without push events (ms).
scan_interval_ms = 1000
# Health-factor band (bps of 1e18): liquidatable ≤ 10_000, near-liq window
# up to `near_liq_threshold_bps`. Omitted keys fall back to serde defaults:
#   liquidatable_threshold_bps = 10000  (HF = 1.00)
#   near_liq_threshold_bps     = 10500  (HF = 1.05)
# Scan cadences per bucket (blocks): defaults hot=1 / warm=10 / cold=100.
#   hot_scan_blocks  = 1
#   warm_scan_blocks = 10
#   cold_scan_blocks = 100

# ── Chains ────────────────────────────────────────────────────────────────
[chain.bnb]
chain_id  = 56
ws_url    = "${BNB_WS_URL}"
http_url  = "${BNB_HTTP_URL}"

# ── Lending protocols ─────────────────────────────────────────────────────
[protocol.venus]
chain       = "bnb"
# Venus Unitroller (main comptroller on BSC)
comptroller = "0xfd36e2c2a6789db23113685031d7f16329158384"

# ── Flash-loan sources ────────────────────────────────────────────────────
[flashloan.aave_v3_bsc]
chain = "bnb"
# Aave V3 Pool on BSC (used for flashLoanSimple — 0.05% fee)
pool  = "0x6807dc923806fe8fd134338eabca509979a7e0cb"
# Aave V3 PoolDataProvider on BSC — resolves aTokens and reserve
# configuration bitmaps (paused / frozen flags) for the adapter.
data_provider = "0x41393e5e337606dc3821075Af65AeE84D7688CBD"

# ── Deployed liquidator contracts ─────────────────────────────────────────
# Populated once CharonLiquidator.sol is deployed on BSC mainnet. Do not
# add a zero-address placeholder — config validation rejects it.

# ── Chainlink price feeds (per chain, per asset symbol) ───────────────────
# Only feeds listed here are polled by the PriceCache. Add more as new
# Venus markets become relevant. Feed addresses from docs.chain.link.
[chainlink.bnb]
BNB  = "0x0567F2323251f0Aab15c8dFb1967E4e8A7D42aeE"
BTCB = "0x264990fbd0A4796A3E3d8E37022BdAf1A5a4C1f0" # BTC / USD (canonical, docs.chain.link)
ETH  = "0x9ef1B8c0E4F7dc8bF5719Ea496883DC6401d5b2e"
USDT = "0xB97Ad0E74fa7d920791E90258A6E2085088b4320"
USDC = "0x51597f405303C4377E36123cBc172b13269EA163"
