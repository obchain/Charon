# Charon — v1 config (Venus on BNB Chain)
#
# Environment variables below (dollar-sign + braces) are substituted at
# load time — see `.env.example` for the full list of expected vars.

[bot]
# Drop opportunities below this USD profit threshold.
min_profit_usd   = 5.0
# Skip liquidations when gas price exceeds this (gwei).
max_gas_gwei     = 10
# Polling cadence for protocols without push events (ms).
scan_interval_ms = 1000
# Health factor at or below which a position is liquidatable (1e18 = 1.0).
liquidatable_threshold = 1.0
# Upper bound of the near-liquidation watch band.
near_liq_threshold     = 1.05

# ── Chains ────────────────────────────────────────────────────────────────
[chain.bnb]
chain_id           = 56
ws_url             = "${BNB_WS_URL}"
http_url           = "${BNB_HTTP_URL}"
# Validator-friendly tip on BSC; raise during congestion.
priority_fee_gwei  = 1
# Private-RPC endpoint (bloxroute / blocknative). Required for any
# chain that has a deployed liquidator — Config::validate refuses to
# start otherwise. Leave the env var unset only on testnet / dev
# runs where `allow_public_mempool = true` is also set below.
private_rpc_url    = "${CHARON_BSC_PRIVATE_RPC_URL}"
# Optional bearer token attached as `Authorization: Bearer <token>`
# to every private-RPC request. Use when the vendor prefers a header
# over a URL-embedded API key. Unset = no Authorization header.
private_rpc_auth   = "${CHARON_BSC_PRIVATE_RPC_AUTH}"
# Escape hatch for local anvil / testnet runs with no private RPC.
# NEVER enable on mainnet — submitting liquidation calldata to the
# public mempool is a guaranteed front-run.
allow_public_mempool = false

# ── Lending protocols ─────────────────────────────────────────────────────
[protocol.venus]
chain       = "bnb"
# Venus Unitroller (main comptroller on BSC)
comptroller = "0xfd36e2c2a6789db23113685031d7f16329158384"

# ── Flash-loan sources ────────────────────────────────────────────────────
[flashloan.aave_v3_bsc]
chain = "bnb"
# Aave V3 Pool on BSC (used for flashLoanSimple — 0.05% fee)
pool  = "0x6807dc923806fe8fd134338eabca509979a7e0cb"

# ── Deployed liquidator contracts ─────────────────────────────────────────
[liquidator.bnb]
chain            = "bnb"
# Placeholder — replaced once CharonLiquidator.sol is deployed on BSC.
contract_address = "0x0000000000000000000000000000000000000000"

# ── Chainlink price feeds (per chain, per asset symbol) ───────────────────
# Only feeds listed here are polled by the PriceCache. Add more as new
# Venus markets become relevant. Feed addresses from docs.chain.link.
[chainlink.bnb]
BNB  = "0x0567F2323251f0Aab15c8dFb1967E4e8A7D42aeE"
BTCB = "0x264990fbd0A4796A3E3d8E37C4d5F87a3aCa5Ebf"
ETH  = "0x9ef1B8c0E4F7dc8bF5719Ea496883DC6401d5b2e"
USDT = "0xB97Ad0E74fa7d920791E90258A6E2085088b4320"
USDC = "0x51597f405303C4377E36123cBc172b13269EA163"
